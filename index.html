<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热点新闻分析</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            margin: 0; 
            padding: 16px; 
            background: #fafafa;
            color: #333;
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 32px 24px;
            text-align: center;
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 20px 0;
        }

        .header-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            font-size: 14px;
            opacity: 0.95;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            display: block;
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .info-value {
            font-weight: 600;
            font-size: 16px;
        }

        .content {
            padding: 24px;
        }

        .word-group {
            margin-bottom: 40px;
        }

        .word-group:first-child {
            margin-top: 0;
        }

        .word-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }

        .word-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .word-name {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .word-count {
            color: #666;
            font-size: 13px;
            font-weight: 500;
        }

        .word-count.hot { color: #dc2626; font-weight: 600; }
        .word-count.warm { color: #ea580c; font-weight: 600; }

        .word-index {
            color: #999;
            font-size: 12px;
        }

        .news-item {
            margin-bottom: 20px;
            padding: 16px 0;
            border-bottom: 1px solid #f5f5f5;
            position: relative;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-item.new::after {
            content: "NEW";
            position: absolute;
            top: 12px;
            right: 0;
            background: #fbbf24;
            color: #92400e;
            font-size: 9px;
            font-weight: 700;
            padding: 3px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        .news-number {
            color: #999;
            font-size: 13px;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
            flex-shrink: 0;
            background: #f8f9fa;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: flex-start;
            margin-top: 8px;
        }

        .news-content {
            flex: 1;
            min-width: 0;
            padding-right: 40px;
        }

        .news-item.new .news-content {
            padding-right: 50px;
        }

        .news-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .source-name {
            color: #666;
            font-size: 12px;
            font-weight: 500;
        }

        .rank-num {
            color: #fff;
            background: #6b7280;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .rank-num.top { background: #dc2626; }
        .rank-num.high { background: #ea580c; }

        .time-info {
            color: #999;
            font-size: 11px;
        }

        .count-info {
            color: #059669;
            font-size: 11px;
            font-weight: 500;
        }

        .news-title {
            font-size: 15px;
            line-height: 1.4;
            color: #1a1a1a;
            margin: 0;
        }

        .news-link {
            color: #2563eb;
            text-decoration: none;
        }

        .news-link:hover {
            text-decoration: underline;
        }

        .news-link:visited {
            color: #7c3aed;
        }

        .loading-tip, .error-tip {
            padding: 40px 20px;
            text-align: center;
            color: #666;
            font-size: 15px;
        }
        .error-tip {
            color: #dc2626;
        }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .header { padding: 24px 20px; }
            .content { padding: 20px; }
            .header-info { grid-template-columns: 1fr; gap: 12px; }
            .news-header { gap: 6px; }
            .news-content { padding-right: 45px; }
            .news-item { gap: 8px; }
            .new-item { gap: 8px; }
            .news-number { width: 20px; height: 20px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">热点新闻分析</div>
            <div class="header-info">
                <div class="info-item">
                    <span class="info-label">报告类型</span>
                    <span class="info-value">当日汇总</span>
                </div>
                <div class="info-item">
                    <span class="info-label">新闻总数</span>
                    <span class="info-value" id="totalNum">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">热点新闻</span>
                    <span class="info-value" id="groupCount">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">生成时间</span>
                    <span class="info-value" id="genTime">--</span>
                </div>
            </div>
        </div>
        <div class="content" id="contentWrap">
            <div class="loading-tip">正在加载最新热点数据...</div>
        </div>
    </div>

<script>
// 加载带时间戳的json，永久规避CDN缓存
async function loadData() {
  try {
    const res = await fetch(`./api/trends.json?_=${Date.now()}`);
    if (!res.ok) throw new Error("数据文件加载失败");
    const data = await res.json();
    renderPage(data);
  } catch (err) {
    document.getElementById("contentWrap").innerHTML = `<div class="error-tip">加载失败：${err.message}</div>`;
    console.error(err);
  }
}

// 工具：判断标题是否命中过滤词
function isFilterTitle(title, filterWords) {
  if (!filterWords || filterWords.length === 0) return false;
  return filterWords.some(word => title.includes(word));
}

// 工具：按source站点对新闻数组分组
function groupBySource(newsList) {
  const groupMap = {};
  newsList.forEach(item => {
    if (!groupMap[item.source]) groupMap[item.source] = [];
    groupMap[item.source].push(item);
  });
  return groupMap;
}

function renderPage(data) {
  // 顶部统计
  document.getElementById("totalNum").innerText = data.total_titles_processed + " 条";
  document.getElementById("groupCount").innerText = data.trends.length + " 条";
  const rawTime = data.generated_at.replace("T", " ").slice(0,16);
  document.getElementById("genTime").innerText = rawTime;

  let html = "";
  // 遍历一级关键词分组
  data.trends.forEach((group, groupIndex) => {
    // 第一步：过滤命中frequency_words的新闻
    const filterWords = data.frequency_words || [];
    const validTitles = group.titles.filter(item => !isFilterTitle(item.title, filterWords));
    
    // 按站点source二次分组
    const sourceGroups = groupBySource(validTitles);
    const sourceKeys = Object.keys(sourceGroups);

    html += `<div class="word-group">
      <div class="word-header">
        <div class="word-info">
          <div class="word-name">${group.keyword_group}</div>
          <div class="word-count hot">${validTitles.length} 条</div>
        </div>
        <div class="word-index">${groupIndex+1}/${data.trends.length}</div>
      </div>`;

    // 遍历每个站点分组
    sourceKeys.forEach(sourceName => {
      const sourceNews = sourceGroups[sourceName];
      html += `<div class="new-source-group">
        <div class="new-source-title">${sourceName}（${sourceNews.length}条）</div>`;
      
      // 渲染该站点下所有新闻
      sourceNews.forEach((item, idx) => {
        const newClass = item.is_new ? "news-item new" : "news-item";
        const rankTags = item.ranks.map(r => {
          if(r <= 3) return `<span class="rank-num top">${r}</span>`;
          if(r <=6) return `<span class="rank-num high">${r}</span>`;
          return `<span class="rank-num">${r}</span>`;
        }).join("");
        const countText = item.appearance_count > 1 ? `<span class="count-info">${item.appearance_count}次</span>` : "";

        html += `
          <div class="${newClass}">
            <div class="news-number">${idx+1}</div>
            <div class="news-content">
              <div class="news-header">
                ${rankTags}
                <span class="time-info">${item.time_info}</span>
                ${countText}
              </div>
              <div class="news-title">
                <a href="${item.url}" target="_blank" class="news-link">${item.title}</a>
              </div>
            </div>
          </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  });

  document.getElementById("contentWrap").innerHTML = html;
}

window.addEventListener("DOMContentLoaded", loadData);
</script>
</body>
</html>
