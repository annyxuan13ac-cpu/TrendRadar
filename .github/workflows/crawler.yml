name: Hot News Crawler

on:
  schedule:
    # 我们使用的是 github 官方提供的资源来进行的推送，而每个账号的资源是限额的，为了不被官方判定为滥用而面临封号的风险，不建议比半小时更低
    - cron: "0 10,12 * * *" # 每小时整点运行一次(实际有偏差) 或者 "*/30 * * * *" (每半小时执行一次) 或者 "*/30 0-14 * * *"(每天早上 8 点到晚上 10 点期间，每半小时运行一次)
  workflow_dispatch:

# 添加权限设置
permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Debug 查看过滤词文件
        run: |
          cd $GITHUB_WORKSPACE
          echo "frequency_words.txt 前20行内容："
          head -n 20 config/frequency_words.txt


      - name: Verify required files
        run: |
          cd $GITHUB_WORKSPACE
          echo "=== 当前仓库根目录: $(pwd) ==="
          echo "=== config文件夹内所有文件 ==="
          ls -la ./config/
          echo "=============================="

          if [ ! -f config/config.yaml ]; then
            echo "❌ 错误: config/config.yaml 文件不存在"
            exit 1
          fi
          if [ ! -f config/frequency_words.txt ]; then
            echo "❌ 错误: config/frequency_words.txt 文件不存在"
            exit 1
          fi
          echo "✅ 配置文件检查通过"
          echo "===== 打印过滤词文件前10行调试 ====="
          head config/frequency_words.txt

      - name: Run crawler
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GITHUB_ACTIONS: true
        run: |
          unset WEWORK_WEBHOOK_URL
          env -u WEWORK_WEBHOOK_URL python main.py


      - name: Commit and push if changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          cd $GITHUB_WORKSPACE
          # 一条命令完成拉取+自动合并，替代fetch+rebase
          git pull origin main --no-edit
          git add api/ output/ img/
          CHANGES=$(git status --porcelain api/ output/ img/)
          if [[ -n "$CHANGES" ]]; then
            git commit -m "Auto update data $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
          else
            echo "无新爬虫数据，跳过提交"
          fi